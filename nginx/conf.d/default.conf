# =============================================================================
# FreelanceCFO — nginx reverse proxy
#
# Current mode: HTTP only (no domain yet — running on EC2 IP)
#
# When you have a domain:
#   1. Replace _ with your domain in server_name
#   2. Add the certbot certificate (see docker-compose.prod.yml comments)
#   3. Add the HTTPS server block below
# =============================================================================

server {
    listen 80;
    server_name _;  # accepts any host (IP direct access)

    # Security headers (apply even without HTTPS)
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Frontend (Next.js)
    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Backend REST API
    location /api/ {
        proxy_pass         http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 20M;
    }

    # Health check
    location /health {
        proxy_pass         http://app:8000;
        proxy_http_version 1.1;
    }

    # WebSockets (payments + CFO streaming)
    location /ws/ {
        proxy_pass          http://app:8000;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }
}

