# =============================================================================
# FreelanceCFO — nginx reverse proxy
#
# Uses Docker's internal DNS resolver (127.0.0.11) with a short TTL so
# nginx re-resolves upstream hostnames after each container restart.
# Without this, nginx caches the old container IP and gets 502 on redeploy.
#
# Current mode: HTTP only (no domain yet — running on EC2 IP)
# When you have a domain: see the HTTPS block at the bottom.
# =============================================================================

server {
    listen 80;
    server_name _;

    # Docker internal DNS — re-resolve upstreams every 10s
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Frontend (Next.js)
    location / {
        set $frontend http://frontend:3000;
        proxy_pass         $frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Backend REST API
    location /api/ {
        set $backend http://app:8000;
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 20M;
    }

    # Health check
    location /health {
        set $backend http://app:8000;
        proxy_pass         $backend;
        proxy_http_version 1.1;
    }

    # WebSockets (payments + CFO streaming)
    location /ws/ {
        set $backend http://app:8000;
        proxy_pass          $backend;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }
}

