name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  # ── Job 1: Run tests ─────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key
          ENVIRONMENT: test
          GEMINI_API_KEY: ""
          STRIPE_SECRET_KEY: ""
          STRIPE_WEBHOOK_SECRET: ""
          SENDGRID_API_KEY: ""
          AWS_S3_BUCKET: ""
          AWS_ACCESS_KEY_ID: ""
          AWS_SECRET_ACCESS_KEY: ""
          TELEGRAM_BOT_TOKEN: ""
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-fail-under=80

  # ── Job 2: Build images and push to GHCR ─────────────────────────────────────
  # Runs on GitHub's fast runners (2 CPU, 7GB RAM) — not your EC2 instance.
  # Uses GitHub Actions cache so subsequent builds only rebuild changed layers.
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to GHCR

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/freelancecfo-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/freelancecfo-frontend:latest
          build-args: |
            NEXT_PUBLIC_API_URL=http://${{ secrets.EC2_HOST }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ── Job 3: Deploy to EC2 ──────────────────────────────────────────────────────
  # EC2 only pulls pre-built images and restarts — no building on the server.
  # Should complete in under 5 minutes.
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: "10m"
          envs: GHCR_TOKEN,GITHUB_OWNER
          script: |
            set -e
            echo "📥 Pulling latest code..."
            cd $HOME/freelancecfo
            git fetch origin main
            git reset --hard origin/main

            echo "🔐 Logging in to GHCR..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_OWNER" --password-stdin

            echo "📦 Pulling latest images..."
            docker compose -f docker-compose.prod.yml --env-file .env.prod pull

            echo "🗄️ Running migrations..."
            docker compose -f docker-compose.prod.yml --env-file .env.prod run --rm app \
              alembic upgrade head

            echo "🚀 Restarting services..."
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d

            echo "⏳ Waiting for app to be ready..."
            for i in $(seq 1 24); do
              if curl -sf http://localhost/health > /dev/null; then
                echo "✅ Health check passed"
                break
              fi
              echo "  attempt $i/24 — not ready yet, waiting 5s..."
              sleep 5
              if [ $i -eq 24 ]; then
                echo "❌ App did not become healthy after 2 minutes"
                docker compose -f docker-compose.prod.yml logs app --tail=50
                exit 1
              fi
            done

            echo "🧹 Cleaning up old images..."
            docker image prune -f

            echo "✅ Done!"
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
