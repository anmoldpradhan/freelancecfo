name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  # ── Job 1: Run tests first ────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key
          ENVIRONMENT: test
          GEMINI_API_KEY: ""
          STRIPE_SECRET_KEY: ""
          STRIPE_WEBHOOK_SECRET: ""
          SENDGRID_API_KEY: ""
          AWS_S3_BUCKET: ""
          AWS_ACCESS_KEY_ID: ""
          AWS_SECRET_ACCESS_KEY: ""
          TELEGRAM_BOT_TOKEN: ""
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-fail-under=80

  # ── Job 2: Deploy (only runs if tests pass) ───────────────────────────────
  deploy:
    needs: test           # this line makes deploy wait for test job
    runs-on: ubuntu-latest
    if: success()         # only deploy if test job succeeded

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: "30m"
          # set -e means: stop script immediately if any command fails
          script: |
            set -e
            echo "🚀 Starting deployment..."
            cd /home/${{ secrets.EC2_USER }}/freelancecfo

            echo "📥 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "🏗️ Building frontend image..."
            docker build \
              --build-arg NEXT_PUBLIC_API_URL=http://${{ secrets.EC2_HOST }}:8000 \
              -f frontend/Dockerfile.prod \
              -t freelancecfo-frontend:latest \
              ./frontend

            echo "🏗️ Building backend image..."
            docker build \
              -t freelancecfo-backend:latest \
              ./backend

            echo "🗄️ Running migrations..."
            docker compose -f docker-compose.prod.yml --env-file .env.prod run --rm app \
              alembic upgrade head

            echo "🚀 Starting services..."
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d

            echo "⏳ Waiting for health check..."
            sleep 15
            curl --fail http://localhost:8000/health || exit 1

            echo "🧹 Cleaning up..."
            docker image prune -f

            echo "✅ Done!"