services:

  # ---------------------------------------------------------------------------
  # nginx — reverse proxy
  # Proxies port 80 → frontend and /api/, /ws/ → backend.
  # All other services are internal-only (no public ports).
  #
  # When you have a domain: update nginx/conf.d/default.conf and run certbot.
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      # Uncomment when you have TLS set up:
      # - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # Uncomment when you have a domain + certbot:
      # - ./nginx/certbot/conf:/etc/letsencrypt:ro
      # - ./nginx/certbot/www:/var/www/certbot:ro
    restart: always
    depends_on:
      - app
      - frontend

  app:
    build: ./backend
    expose:
      - "8000"
    env_file: .env.prod
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    expose:
      - "3000"
    environment:
      # Replace with your EC2 public IP or domain when you have one
      - NEXT_PUBLIC_API_URL=http://13.53.56.157
    restart: always
    depends_on:
      - app

  celery_worker:
    build: ./backend
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    env_file: .env.prod
    restart: always
    depends_on:
      - app
      - redis

  celery_beat:
    build: ./backend
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file: .env.prod
    restart: always
    depends_on:
      - celery_worker

  # Flower is internal-only. Access via SSH tunnel:
  #   ssh -L 5555:localhost:5555 user@YOUR_EC2_IP
  flower:
    build: ./backend
    command: celery -A app.tasks.celery_app flower --port=5555 --address=127.0.0.1
    expose:
      - "5555"
    env_file: .env.prod
    restart: always

  telegram_bot:
    build: ./backend
    command: python -c "from app.services.telegram_bot import run_bot; run_bot()"
    env_file: .env.prod
    restart: always
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    env_file: .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
