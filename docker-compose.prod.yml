services:

  # ---------------------------------------------------------------------------
  # nginx — reverse proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      # Uncomment when you have TLS set up:
      # - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # Uncomment when you have a domain + certbot:
      # - ./nginx/certbot/conf:/etc/letsencrypt:ro
      # - ./nginx/certbot/www:/var/www/certbot:ro
    restart: always
    depends_on:
      app:
        condition: service_healthy
      frontend:
        condition: service_started

  app:
    image: ghcr.io/${GITHUB_OWNER}/freelancecfo-backend:latest
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    expose:
      - "8000"
    env_file: .env.prod
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  frontend:
    image: ghcr.io/${GITHUB_OWNER}/freelancecfo-frontend:latest
    expose:
      - "3000"
    restart: always
    depends_on:
      - app

  celery_worker:
    image: ghcr.io/${GITHUB_OWNER}/freelancecfo-backend:latest
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    env_file: .env.prod
    restart: always
    depends_on:
      - app
      - redis

  celery_beat:
    image: ghcr.io/${GITHUB_OWNER}/freelancecfo-backend:latest
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file: .env.prod
    restart: always
    depends_on:
      - celery_worker

  # Flower is internal-only. Access via SSH tunnel:
  #   ssh -L 5555:localhost:5555 user@YOUR_EC2_IP
  flower:
    image: ghcr.io/${GITHUB_OWNER}/freelancecfo-backend:latest
    command: celery -A app.tasks.celery_app flower --port=5555 --address=127.0.0.1
    expose:
      - "5555"
    env_file: .env.prod
    restart: always

  telegram_bot:
    image: ghcr.io/${GITHUB_OWNER}/freelancecfo-backend:latest
    command: python -c "from app.services.telegram_bot import run_bot; run_bot()"
    env_file: .env.prod
    restart: always
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    env_file: .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
